site_name: LabLivre
site_url: https://lablivre.unb.br/

theme:
  name: null
  custom_dir: theme

use_directory_urls: true

plugins:
  - search
  - publications:
      collections:
        - name: publications
          path: publications/
          format_date: true
        - name: projects
          path: projects/
          exclude:
            - gsoc-projects/
        - name: capacitacao
          path: capacitacao/
        - name: treinamentos
          path: treinamentos/

extra_css:
  - assets/navbar.css
  - assets/footer.css
  - assets/home/home.css
  - assets/home/hero-carousel.css
  
extra_javascript:
  - assets/navbar.js
  - assets/home/home.js
  - assets/home/hero-carousel.js

watch:
  - theme
  - plugins
