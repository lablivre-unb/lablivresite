<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>LabLivre - Pagina nao encontrada</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrapper">
      <section class="code-row" aria-hidden="true">
        <span class="digit">4</span>
        <video
          class="zero-video"
          src="monstro.webm"
          autoplay
          loop
          muted
          playsinline
        ></video>
        <span class="digit">4</span>
      </section>

      <section class="info">
        <h1 class="info-title">Pagina nao encontrada!</h1>
        <p class="info-subtitle">
          Parece que voce chegou em um endereco que nao existe no LabLivre.
        </p>

        <a href="../index.html" class="info-cta">
          <span class="info-cta-icon">
            <span class="info-cta-arrow"></span>
          </span>
          <span class="info-cta-text">Voltar para a pagina inicial</span>
        </a>
      </section>
    </main>
  </body>
</html>
